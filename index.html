<script>
document.addEventListener('DOMContentLoaded', function() {
  const strainList = document.querySelector('.strain-list-container');
  const scrollBtn = document.getElementById('strainScrollTop');
  if (!strainList || !scrollBtn) return;
  
  strainList.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('show', strainList.scrollTop > 300);
  }, { passive: true });
  
  scrollBtn.addEventListener('click', () => {
    strainList.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>

    <!-- ========== CHAT GOES HERE — OUTSIDE .container ========== -->
    <div id="chat-section" class="frosted-section">
      <h2 style="color:#00ff00; text-shadow:0 0 10px #00ff00; margin-bottom:16px;">💬 The Lit Lobby 💬</h2>
      <div id="chat-container">
        <div id="chat-messages"></div>
          <div id="chat-input-area">
            <button id="adminToggle" style="background:none; border:none; cursor:pointer; font-size:16px; padding:0 5px;">🔒</button>

          <button id="chatSend" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <div id="chat-status"></div>
      </div>
    </div>
    <!-- ========== END CHAT ========== -->
  
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

        <!-- Chat script -->
    <script>
(function() {
  const firebaseConfig = {
    apiKey:            "AIzaSyDH1q1n0vYkBgy5P5ma0uwN0aO59WjL_OE",
    authDomain:        "stonercomments.firebaseapp.com",
    projectId:         "stonercomments",
    storageBucket:     "stonercomments.firebasestorage.app",
    messagingSenderId: "604159949829",
    appId:             "1:604159949829:web:ca59dbf2427422750bf06c"
  };

  firebase.initializeApp(firebaseConfig);
  const db    = firebase.firestore();
  const auth  = firebase.auth();

  // ===== REAL-TIME PAGE RELOAD COUNTER =====
  const counterRef = db.collection('site_stats').doc('total_hits');
  counterRef.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true });

  let gotRealData = false;
  counterRef.onSnapshot((doc) => {
    if (!gotRealData && doc.metadata.fromCache) return;
    gotRealData = true;
    const totalHits = doc.exists ? (doc.data().count || 0) : 0;
    const counterEl = document.getElementById('visitor-counter');
    if (counterEl) {
      counterEl.textContent = 'Stoned Visitors: ' + totalHits;
    }
  });
  // ===== END COUNTER =====

  const messagesEl  = document.getElementById('chat-messages');
  const inputEl     = document.getElementById('chatInput');
  const sendBtn     = document.getElementById('chatSend');
  const statusEl    = document.getElementById('chat-status');

  let userId = null, userColor = null, isAtBottom = true;

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 70%, 55%)`;
  }

  function formatTime(ts) {
    if (!ts || !ts.toDate) return 'just now';
    const d = ts.toDate(), now = new Date(), diff = Math.floor((now - d) / 60000);
    if (diff < 1) return 'just now';
    if (diff < 60) return `${diff}m ago`;
    const hr = Math.floor(diff / 60);
    if (hr < 24) return `${hr}h ago`;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function sanitize(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function createMessageEl(data, docId) {
    const w = document.createElement('div');
    w.className = 'chat-bubble-wrapper' + (data.uid === userId ? ' own' : '');
    const b = document.createElement('div');
    b.className = 'chat-bubble';
    const m = document.createElement('div');
    m.className = 'chat-meta';
    const dot = document.createElement('span');
    dot.className = 'chat-user-dot';
    dot.style.backgroundColor = data.color;
    const nm = document.createElement('span');
    nm.className = 'chat-username';
    nm.textContent = data.displayName || 'Anon';
    nm.style.color = data.color;
    const tm = document.createElement('span');
    tm.className = 'chat-time';
    tm.textContent = formatTime(data.timestamp);
    m.append(dot, nm, tm);
    const body = document.createElement('div');
    body.className = 'chat-body';
    body.innerHTML = sanitize(data.text);
    b.append(m, body);

    // --- ADMIN DELETE BUTTON ---
    const delBtn = document.createElement('span');
    delBtn.className = 'admin-delete-btn';
    delBtn.textContent = '✖';
    delBtn.onclick = () => {
      if (confirm('Delete this message?')) {
        db.collection('chatMessages').doc(docId).delete().catch(err => console.error(err));
        w.remove();
      }
    };
    b.appendChild(delBtn);

    w.appendChild(b);
    if (docId) w.setAttribute('data-id', docId);
    return w;
  }

  function scrollToBottom() { messagesEl.scrollTop = 0; } 
  messagesEl.addEventListener('scroll', () => {
    isAtBottom = messagesEl.scrollTop < 80; 
  });

  function listenForMessages() {
    messagesEl.innerHTML = '';
    db.collection('chatMessages')
      .orderBy('timestamp', 'desc')
      .limit(50)
      .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === 'added') {
            if (change.doc.data().uid === userId) {
              const tempEl = messagesEl.querySelector(`[data-id^="temp-"]`);
              if (tempEl) {
                tempEl.setAttribute('data-id', change.doc.id);
                return; 
              }
            }
            if (messagesEl.querySelector(`[data-id="${change.doc.id}"]`)) return;
            const el = createMessageEl(change.doc.data(), change.doc.id);
            messagesEl.prepend(el);
            if (isAtBottom) scrollToBottom();
          }
        });
      });
  }

  function getChatName() {
    let name = localStorage.getItem('wildcatChatName');
    if (!name) {
      name = prompt('What should we call you in the chat?', '');
      if (name && name.trim().length > 0) {
        name = name.trim();
        localStorage.setItem('wildcatChatName', name);
      } else {
        const adj = ['Chill','Faded','Blazing','Cosmic','Groovy','Zen','Epic','Wild','Mellow','Frosty'];
        const noun = ['Panda','Cat','Owl','Fox','Wolf','Bear','Hawk','Tiger','Llama','Deer'];
        name = `${adj[Math.floor(Math.random()*adj.length)]}${noun[Math.floor(Math.random()*noun.length)]}${Math.floor(Math.random()*99)}`;
        localStorage.setItem('wildcatChatName', name);
      }
    }
    return name;
  }

  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || !userId) return;

    inputEl.value = '';
    inputEl.focus();

    const tempId = 'temp-' + Date.now();
    const chatName = getChatName();

    const el = createMessageEl({
      text, uid: userId, color: userColor,
      displayName: chatName,
      timestamp: { toDate: () => new Date() }
    }, tempId);
    messagesEl.prepend(el);
    scrollToBottom();

    db.collection('chatMessages').add({
      text, uid: userId, color: userColor,
      displayName: chatName,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      expiresAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(err => {
      console.error(err);
      el.remove();
      statusEl.textContent = 'Failed to send.';
      setTimeout(() => statusEl.textContent = '', 3000);
    });
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  statusEl.textContent = 'Connecting...';
  auth.signInAnonymously().then(cred => {
    userId = cred.user.uid;
    userColor = stringToColor(userId);
    statusEl.textContent = '';
    listenForMessages();
  }).catch(err => {
    console.error(err);
    statusEl.textContent = 'Could not connect. Refresh to retry.';
  });

  // --- ADMIN MODE TOGGLE ---
  const adminBtn = document.getElementById('adminToggle');
  if (adminBtn) {
    adminBtn.addEventListener('click', () => {
      const pass = prompt("Enter admin password:");
      if (pass === 'Champion420') { 
        messagesEl.classList.toggle('admin-mode');
        adminBtn.textContent = messagesEl.classList.contains('admin-mode') ? '🔓' : '🔒';
      } else if (pass !== null) {
        alert('Wrong password.');
      }
    });
  }

})();
</script>
